<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Importador XML Multifuncional - Ailog</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bulma@0.9.4/css/bulma.min.css">
    <style>
        body { background-color: #f4f7f9; }
        .container { margin-top: 40px; max-width: 900px; }
        .log-box { background: #2d3436; color: #fab1a0; padding: 15px; border-radius: 5px; font-family: monospace; max-height: 250px; overflow-y: auto; margin-top: 20px; }
    </style>
</head>
<body>
    <section class="section">
        <div class="container">
            <div class="box">
                <h1 class="title is-4">🚀 Importador NFe (Combustíveis & ARLA)</h1>
                
                <div class="columns">
                    <div class="column"><input class="input" type="text" id="codEmpresa" placeholder="Cód. Empresa"></div>
                    <div class="column"><input class="input" type="text" id="codFilial" placeholder="Cód. Filial"></div>
                </div>

                <div class="field">
                    <div class="file is-info is-boxed has-name is-fullwidth">
                        <label class="file-label">
                            <input class="file-input" type="file" id="xmlFiles" accept=".xml" multiple onchange="document.getElementById('file-name').innerText = this.files.length + ' arquivos'">
                            <span class="file-cta">
                                <span class="file-label">Selecionar XMLs</span>
                            </span>
                            <span class="file-name" id="file-name">Nenhum arquivo...</span>
                        </label>
                    </div>
                </div>

                <button class="button is-primary is-fullwidth" onclick="processar()">Processar e Enviar</button>
                <div id="log" class="log-box" style="display:none;"></div>
            </div>
        </div>
    </section>

    <script>
        const WEB_APP_URL = "SUA_URL_DO_GOOGLE_SCRIPT_AQUI";

        function getTag(parent, tagNames) {
            if (!parent) return "";
            // Aceita uma string ou um array de nomes de tags para tentar em ordem
            const tags = Array.isArray(tagNames) ? tagNames : [tagNames];
            for (let name of tags) {
                let el = parent.getElementsByTagName(name)[0];
                if (el && el.textContent) return el.textContent;
            }
            return "";
        }

        async function processar() {
            const files = document.getElementById('xmlFiles').files;
            const log = document.getElementById('log');
            log.style.display = 'block';
            log.innerHTML = "Iniciando...";

            for (let file of files) {
                const text = await file.text();
                const xml = new DOMParser().parseFromString(text, "text/xml");
                
                // 1. Dados fora da tag NFe (Protocolo)
                const nProt = getTag(xml, "nProt");

                // 2. Estrutura Principal
                const infNFe = xml.getElementsByTagName("infNFe")[0];
                const ide = xml.getElementsByTagName("ide")[0];
                const emit = xml.getElementsByTagName("emit")[0];
                const dest = xml.getElementsByTagName("dest")[0];
                const total = xml.getElementsByTagName("ICMSTot")[0];
                const enderEmit = emit.getElementsByTagName("enderEmit")[0];
                const chave = infNFe.getAttribute("Id").replace("NFe", "");

                // 3. Processar Itens (Produtos)
                const itens = xml.getElementsByTagName("det");
                for (let i = 0; i < itens.length; i++) {
                    const item = itens[i];
                    const prod = item.getElementsByTagName("prod")[0];
                    const imposto = item.getElementsByTagName("imposto")[0];

                    const payload = {
                        cod_empresa: document.getElementById('codEmpresa').value,
                        cod_filial: document.getElementById('codFilial').value,
                        cnpj_zf: getTag(dest, "CNPJ"),
                        cnpj_fornecedor: getTag(emit, "CNPJ"),
                        serie: getTag(ide, "serie"),
                        numero: getTag(ide, "nNF"),
                        ie_posto: getTag(emit, "IE"),
                        logradouro: getTag(enderEmit, "xLgr"),
                        bairro: getTag(enderEmit, "xBairro"),
                        cep: getTag(enderEmit, "CEP"),
                        chave_nfe: chave,
                        protocolo: nProt,
                        data_emissao: getTag(ide, "dhEmi").split("T")[0],
                        valor_total_doc: getTag(total, "vNF"),
                        descricao_item: getTag(prod, "xProd"),
                        quantidade: getTag(prod, "qCom"),
                        unidade: getTag(prod, "uCom"),
                        ncm: getTag(prod, "NCM"),
                        
                        // Lógica para ICMS (Tenta Monofásico, se não tiver, pega o comum)
                        bc_icms: getTag(imposto, ["qBCMonoRet", "vBC"]),
                        aliq_icms: getTag(imposto, ["adRemICMSRet", "pICMS"]),
                        valor_icms: getTag(imposto, ["vICMSMonoRet", "vICMS"]),
                        
                        // PIS e COFINS
                        valor_pis: getTag(imposto, "vPIS"),
                        valor_cofins: getTag(imposto, "vCOFINS")
                    };

                    await fetch(WEB_APP_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(payload) });
                }
                log.innerHTML += `<br>✅ Enviado: ${file.name}`;
            }
            log.innerHTML += "<br>--- Finalizado ---";
        }
    </script>
</body>
</html>
