<!DOCTYPE html>
<html>
<head>
    <title>Importador XML - ZF</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bulma@0.9.4/css/bulma.min.css">
</head>
<body class="section">
    <div class="container">
        <h1 class="title">Importar Notas Fiscais (Modelo 55)</h1>
        <input class="input" type="file" id="xmlFiles" accept=".xml" multiple>
        <button class="button is-primary mt-3" onclick="processar()">Enviar para Planilha</button>
        <div id="status" class="mt-3"></div>
    </div>

    <script>
        const WEB_APP_URL = "SUA_URL_AQUI"; // Cole a URL que você copiou do Google

        async function processar() {
            const files = document.getElementById('xmlFiles').files;
            const statusDiv = document.getElementById('status');
            
            for (let file of files) {
                const text = await file.text();
                const parser = new DOMParser();
                const xmlDoc = parser.parseFromString(text, "text/xml");

                // Extraindo dados básicos (Exemplo de Tags do Modelo 55)
                const dados = {
                    cnpj_zf: xmlDoc.getElementsByTagName("dest")[0].getElementsByTagName("CNPJ")[0].textContent,
                    cnpj_fornecedor: xmlDoc.getElementsByTagName("emit")[0].getElementsByTagName("CNPJ")[0].textContent,
                    serie: xmlDoc.getElementsByTagName("serie")[0].textContent,
                    numero: xmlDoc.getElementsByTagName("nNF")[0].textContent,
                    chave: xmlDoc.getElementsByTagName("infNFe")[0].getAttribute("Id").replace("NFe", ""),
                    valor_total: xmlDoc.getElementsByTagName("vNF")[0].textContent,
                    descricao_item: xmlDoc.getElementsByTagName("xProd")[0].textContent,
                    quantidade: xmlDoc.getElementsByTagName("qCom")[0].textContent
                };

                // Enviando para o Google Sheets via POST
                statusDiv.innerHTML = `Processando: ${file.name}...`;
                
                await fetch(WEB_APP_URL, {
                    method: 'POST',
                    mode: 'no-cors', // Evita erro de segurança (CORS)
                    body: JSON.stringify(dados)
                });
            }
            statusDiv.innerHTML = "✅ Todas as notas foram enviadas!";
        }
    </script>
</body>
</html>
